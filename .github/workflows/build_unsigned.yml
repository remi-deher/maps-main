name: Build Unsigned IPA
on:
  push:
    paths:
      - 'client/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: |
          cd client
          npm install

      - name: Expo Prebuild
        run: |
          cd client
          npx expo prebuild --platform ios --no-install

      - name: Install Pods
        run: |
          cd client/ios
          pod install --repo-update

      - name: Build Unsigned App
        run: |
          cd client/ios
          xcodebuild -workspace *.xcworkspace \
                     -scheme client \
                     -configuration Release \
                     -sdk iphoneos \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath ./build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     clean build

      - name: Create IPA
        run: |
          mkdir -p Payload
          # Correction du chemin vers l'app générée
          cp -r client/ios/build/Build/Products/Release-iphoneos/client.app Payload/
          zip -r GPSMock.ipa Payload

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: Unsigned-IPA
          path: GPSMock.ipa
