services:
  gps-mock-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: gps-mock-server
    restart: unless-stopped
    privileged: true
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
      - /dev/bus/usb:/dev/bus/usb
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # ATTENTION: Sur Windows Docker Desktop, network_mode: host ne mappe pas les ports vers localhost.
    # Pour tester sur Windows, on désactive network_mode: host et on utilise ports.
    # Lors du déploiement sur TrueNAS (Linux), décommentez network_mode: host et supprimez ports.
    network_mode: host # Crucial pour mDNS sur TrueNAS / Linux
    # ports:
    #   - "8080:8080"
    # sysctls:
    #   - net.ipv6.conf.all.disable_ipv6=0
    #   - net.ipv6.conf.default.disable_ipv6=0
    volumes:
      # Persistance des certificats de confiance de l'iPhone
      - lockdown-data:/var/lib/lockdown
      # Optionnel : logs persistants
      - ./logs:/app/server/logs
    environment:
      - NODE_ENV=production
      - DEBUG=true

volumes:
  lockdown-data:
