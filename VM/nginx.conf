server {
    listen 80;
    server_name _;

    # Optimisation des logs
    access_log /var/log/nginx/gps-mock-access.log;
    error_log /var/log/nginx/gps-mock-error.log;

    # Client-side assets (Dashboard)
    location / {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Sécurité
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts pour éviter les déconnexions Socket.io
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # API IPC et Companion
    location /api {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Socket.io (indispensable pour la carte en temps réel)
    location /socket.io {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
