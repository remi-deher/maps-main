<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <title>GPS Mock — iPhone Location Spoofer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="renderer/css/app.css" />
</head>

<body>

  <header>
    <h1>📍 GPS Mock</h1>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Rechercher une ville, une adresse..." />
      <div id="search-results"></div>
    </div>

    <div class="badges">
      <button id="theme-toggle" class="icon-btn" style="color: var(--text-main); font-size: 16px; margin-right: 8px;" title="Basculer le thème">☀️</button>

      <div id="sim-badge">
        <div id="sim-dot"></div>
        <span id="sim-text">Simulation active</span>
      </div>

      <div id="tunnel-badge" class="starting">
        <div id="tunnel-dot"></div>
        <span id="tunnel-text">Connexion...</span>
      </div>
    </div>
  </header>

  <div class="main">
    <div id="map"></div>

    <div class="panel">
      <div class="panel-scroll">

        <!-- Simulation en cours -->
        <div id="active-sim-box">
          <div class="active-sim-header">
            <span>●</span> Simulation en cours
          </div>
          <div class="active-sim-name" id="active-sim-name">—</div>
          <div class="active-sim-coords" id="active-sim-coords">—</div>
          <div class="active-sim-latency" id="active-sim-latency" style="font-size: 11px; color: #a0b4e0; margin-top: 4px;"></div>
          <div id="active-sim-map" style="display:none; height: 150px; margin-top: 10px; border-radius: 6px; border: 1px solid var(--border-badge-success);"></div>
        </div>

        <!-- Position sélectionnée -->
        <div>
          <h2>Position sélectionnée</h2>
          <div class="coords-box">
            <div class="coords-row">
              <span>Lieu</span>
              <span id="disp-name"
                style="font-size:11px;max-width:170px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#a0b4e0">—</span>
            </div>
            <div class="coords-row">
              <span>Latitude</span>
              <span id="disp-lat" class="coords-copyable" title="Cliquer pour copier">—</span>
            </div>
            <div class="coords-row">
              <span>Longitude</span>
              <span id="disp-lon" class="coords-copyable" title="Cliquer pour copier">—</span>
            </div>
          </div>
        </div>

        <hr />

        <button class="btn btn-primary" id="btn-teleport" disabled>🚀 Téléporter l'iPhone ici</button>
        <button class="btn btn-secondary" id="btn-favorite" disabled>⭐ Ajouter aux favoris</button>
        <button class="btn btn-danger" id="btn-clear">✕ Réinitialiser la position</button>

        <hr />

        <div>
          <h2>Journal</h2>
          <div class="log-box" id="log"></div>
          <div style="display: flex; gap: 6px;">
            <button class="btn btn-secondary" id="btn-clear-log" style="margin-top:6px;font-size:11px;padding:5px">🗑 Effacer le journal</button>
            <button class="btn btn-secondary" id="btn-open-logs" style="margin-top:6px;font-size:11px;padding:5px">📁 Ouvrir les logs</button>
          </div>
        </div>

      </div>

      <!-- Tabs -->
      <div class="tabs">
        <div class="tab active" data-tab="history">🕐 Historique</div>
        <div class="tab" data-tab="favorites">⭐ Favoris</div>
        <!-- ⚙️ Config ajouté dynamiquement par ui-settings.js -->
      </div>

      <!-- Recherche favoris -->
      <div class="list-search-wrap" id="fav-search-wrap">
        <input type="text" id="fav-search" placeholder="Filtrer les favoris..." />
      </div>

      <div id="tab-history" class="list-panel active">
        <div class="list-empty" id="history-empty">Aucun historique</div>
      </div>

      <div id="tab-favorites" class="list-panel">
        <div class="list-empty" id="favorites-empty">Aucun favori</div>
      </div>

      <!-- #tab-settings injecté par ui-settings.js -->

    </div>
  </div>

  <!-- Modal favori -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h3>⭐ Nommer ce favori</h3>
      <input type="text" id="modal-input" placeholder="Ex: Maison, Bureau, Tokyo..." />
      <div class="modal-actions">
        <button class="btn btn-secondary" id="modal-cancel">Annuler</button>
        <button class="btn btn-primary" id="modal-confirm">Enregistrer</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Renderer modules — ordre de chargement important -->
  <script src="renderer/js/state.js"></script>
  <script src="renderer/js/services/storage-service.js"></script>
  <script src="renderer/js/ui/notifier.js"></script>
  <script src="renderer/js/ui/logger.js"></script>
  <script src="renderer/js/ui/theme.js"></script>
  <script src="renderer/js/ui/tabs.js"></script>
  <script src="renderer/js/ui/monitor.js"></script>
  <script src="renderer/js/ui/clipboard.js"></script>
  <script src="renderer/js/ui.js"></script>
  <script src="renderer/js/map.js"></script>
  <script src="renderer/js/search.js"></script>
  <script src="renderer/js/history-favorites.js"></script>
  <script src="renderer/js/ui-settings.js"></script>
  <script src="renderer/js/app.js"></script>

</body>

</html>
