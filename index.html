<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <title>GPS Mock — iPhone Location Spoofer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="renderer/css/app.css" />
</head>

<body>

  <!-- Bouton Toggle Sidebar (Hamburger) -->
  <button id="sidebar-toggle" title="Menu" class="glass-panel">☰</button>

  <!-- Barre de Recherche Flottante -->
  <div class="search-container">
    <div class="search-card glass-panel">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Rechercher un lieu..." autocomplete="off"/>
      <button id="theme-toggle" class="icon-btn" title="Basculer le thème">☀️</button>
    </div>
    <div id="search-results" class="modern glass-panel"></div>
  </div>

  <!-- Status Pills (Flottants en bas à droite) -->
  <div class="status-container">
    <div id="sim-badge" class="glass-panel">
      <div id="sim-dot"></div>
      <span id="sim-text">Simulation</span>
    </div>
    <div id="tunnel-badge" class="glass-panel starting">
      <div id="tunnel-dot"></div>
      <span id="tunnel-text">Connexion...</span>
    </div>
  </div>

  <div class="main-container">
    <div id="map"></div>

    <!-- Sidebar Card Flottante -->
    <div class="sidebar-container" id="sidebar">
      <div class="sidebar-card glass-panel">
        
        <div class="sidebar-header">
          <h2>Ma Position</h2>
          <div class="sidebar-actions">
            <button class="icon-btn" id="btn-open-logs" title="Voir les logs">📜</button>
          </div>
        </div>

        <div class="sidebar-content">
          <!-- Simulation en cours -->
          <div id="active-sim-box">
            <div class="active-sim-header">
              <span>●</span> En direct
            </div>
            <div class="active-sim-name" id="active-sim-name">—</div>
            <div class="active-sim-coords" id="active-sim-coords">—</div>
            <div class="active-sim-latency" id="active-sim-latency" style="font-size: 11px; color: var(--text-muted); margin-top: 4px;"></div>
          </div>

          <!-- Position sélectionnée -->
          <div class="coords-box">
            <div class="coords-row">
              <span id="disp-name" style="font-size:12px; color:var(--text-main); font-weight: 500;">Sélectionnez un lieu</span>
            </div>
            <div class="coords-row">
              <span id="disp-lat" class="coords-copyable">—</span>
              <span id="disp-lon" class="coords-copyable">—</span>
            </div>
            
            <div class="quick-actions" style="margin-top: 12px; display: flex; gap: 8px;">
              <button class="btn btn-primary" id="btn-teleport" disabled>🚀 Téléporter</button>
              <button class="btn btn-secondary" id="btn-favorite" disabled style="padding: 9px 12px;">⭐</button>
            </div>
          </div>

          <!-- Tabs (Historique / Favoris / Config) -->
          <div class="tabs">
            <div class="tab active" data-tab="history">Historique</div>
            <div class="tab" data-tab="favorites">Favoris</div>
            <!-- Config injecté ici -->
          </div>

          <div id="tab-history" class="list-panel active">
             <div class="list-empty" id="history-empty">Aucun historique</div>
          </div>
          <div id="tab-favorites" class="list-panel">
             <div class="list-search-wrap" id="fav-search-wrap">
               <input type="text" id="fav-search" placeholder="Filtrer..." />
             </div>
             <div class="list-empty" id="favorites-empty">Aucun favori</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Fenêtre de Logs Flottante -->
  <div id="log-window" class="glass-panel" style="display:none;">
    <div class="log-header">
      <span>📜 Journal Système</span>
      <button class="icon-btn" id="btn-close-logs">✕</button>
    </div>
    <div class="log-box" id="log"></div>
    <div class="log-actions">
      <button class="btn-text" id="btn-clear-log">Effacer</button>
    </div>
  </div>

  <!-- Modal favori -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h3>⭐ Nommer ce favori</h3>
      <input type="text" id="modal-input" placeholder="Ex: Maison, Bureau, Tokyo..." />
      <div class="modal-actions">
        <button class="btn btn-secondary" id="modal-cancel">Annuler</button>
        <button class="btn btn-primary" id="modal-confirm">Enregistrer</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Renderer modules — ordre de chargement important -->
  <script src="renderer/js/state.js"></script>
  <script src="renderer/js/services/storage-service.js"></script>
  <script src="renderer/js/ui/notifier.js"></script>
  <script src="renderer/js/ui/logger.js"></script>
  <script src="renderer/js/ui/theme.js"></script>
  <script src="renderer/js/ui/tabs.js"></script>
  <script src="renderer/js/ui/monitor.js"></script>
  <script src="renderer/js/ui/clipboard.js"></script>
  <script src="renderer/js/ui/sidebar-manager.js"></script>
  <script src="renderer/js/ui/log-window.js"></script>
  <script src="renderer/js/ui.js"></script>
  <script src="renderer/js/map.js"></script>
  <script src="renderer/js/search.js"></script>
  <script src="renderer/js/history-favorites.js"></script>
  <script src="renderer/js/ui-settings.js"></script>
  <script src="renderer/js/app.js"></script>

</body>

</html>
